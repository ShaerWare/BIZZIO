name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: Pint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml, bcmath, gd, zip, pcntl, sockets, pdo_sqlite, sqlite3, exif
          coverage: none

      - name: Prepare .env
        run: cp .env.example .env

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

  assets:
    name: Assets freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Ensure committed public/build is up to date
        run: |
          if ! git diff --quiet -- public/build; then
            echo "::error::public/build is out of date. Run 'npm run build' locally and commit the result before pushing."
            git --no-pager diff --stat -- public/build
            exit 1
          fi
          echo "public/build is up to date."
