name: Deploy to production

# Runs after CI succeeds on main, then deploys to bizzio.ru.
# The `production` environment requires a manual approval (configured in
# repo Settings -> Environments), which is the "заказчик доволен -> деплой" gate.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy main -> bizzio.ru
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/BIZZIO
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
